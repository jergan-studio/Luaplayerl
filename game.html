<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minecraft 3D Engine</title>
  <style>
    body { margin:0; overflow:hidden; }
    #ui {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      background:rgba(0,0,0,0.5);
      padding:10px;
      font-family:Arial;
    }
    #crosshair {
      position:absolute;
      left:50%;
      top:50%;
      width:10px;
      height:10px;
      margin-left:-5px;
      margin-top:-5px;
      border:2px solid white;
      border-radius:50%;
    }
  </style>
</head>
<body>

<div id="ui">Click to play | WASD move | Space jump | Click = build mode</div>
<div id="crosshair"></div>

<script type="module" src="game.js"></script>
</body>
</html>
