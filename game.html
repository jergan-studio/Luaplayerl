<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Voxel Engine Final</title>

  <style>
    body { margin:0; overflow:hidden; }
    #ui {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      background:rgba(0,0,0,0.5);
      padding:10px;
      font-family:Arial;
      z-index:10;
    }
    #crosshair {
      position:absolute;
      left:50%;
      top:50%;
      width:6px;
      height:6px;
      margin-left:-3px;
      margin-top:-3px;
      border:2px solid white;
      border-radius:50%;
      z-index:10;
    }
  </style>
</head>
<body>

<div id="ui">
  WASD move | Mouse look | Click = lock | Left break | Right place | 1-3 blocks
</div>
<div id="crosshair"></div>

<script type="module" src="./game.js"></script>

</body>
</html>
