<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minecraft HTML Engine</title>
  <style>
    body { margin:0; overflow:hidden; }
    #ui {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      background:rgba(0,0,0,0.5);
      padding:10px;
      font-family:Arial;
    }
    #hotbar {
      position:absolute;
      bottom:10px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:5px;
    }
    .slot {
      width:40px;height:40px;
      background:rgba(0,0,0,0.5);
      border:2px solid white;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .sel { border:2px solid yellow; }
  </style>
</head>
<body>

<div id="ui">WASD move | Click lock | ` = Build Mode</div>
<div id="hotbar"></div>

<script type="module" src="game.js"></script>
</body>
</html>
